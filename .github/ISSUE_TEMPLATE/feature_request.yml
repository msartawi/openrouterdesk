name: Feature request
description: Propose a safe, evidence-based enhancement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired user outcome
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Does this alter router configuration?
      options:
        - No, read-only
        - Planning/dry-run only
        - Yes, writes configuration
        - Firmware-related
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Compatibility evidence
