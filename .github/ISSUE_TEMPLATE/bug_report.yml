name: Bug report
description: Report a reproducible non-security defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, session tokens, complete backups, or private network inventories.
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenRouterDesk version
    validations:
      required: true
  - type: textarea
    id: router
    attributes:
      label: Router compatibility information
      description: Model, hardware revision, firmware/build, and role. Redact serial/MAC/public IP.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
