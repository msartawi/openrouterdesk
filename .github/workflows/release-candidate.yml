name: Unsigned Release Candidate

on:
  workflow_dispatch:
    inputs:
      version_note:
        description: Human-readable purpose of this candidate
        required: true
        type: string
  push:
    tags:
      - 'v*-rc*'
      - 'v*-rc.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and package
        run: npm run check && npm run dist:win

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem release -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Add-Content release/SHA256SUMS.txt
          }

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: release/*

      - name: Upload unsigned candidate artifact
        uses: actions/upload-artifact@v7
        with:
          name: openrouterdesk-unsigned-release-candidate
          path: release/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $note = @'
Unsigned Windows NSIS release candidate for tester feedback.

**Not signed.** Do not use for production. Live router writes and firmware upload remain disabled.
'@
          gh release create "${{ github.ref_name }}" (Get-ChildItem release -File | ForEach-Object { $_.FullName }) `
            --prerelease `
            --title "OpenRouterDesk ${{ github.ref_name }} (unsigned RC)" `
            --notes $note
