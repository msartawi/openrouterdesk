name: Unsigned Release Candidate

on:
  workflow_dispatch:
    inputs:
      version_note:
        description: Human-readable purpose of this candidate
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-2025
    environment: release-candidate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and package
        run: npm run check && npm run dist:win

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem release -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Add-Content release/SHA256SUMS.txt
          }

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: release/*

      - name: Upload unsigned candidate
        uses: actions/upload-artifact@v6
        with:
          name: openrouterdesk-unsigned-release-candidate
          path: release/*
          if-no-files-found: error
          retention-days: 14

# This workflow intentionally does not publish a GitHub Release.
# Add a separate protected signed-release workflow after SignPath, Store,
# or OV cloud-signing governance is configured.
